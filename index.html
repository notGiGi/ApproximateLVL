<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApproximateLVL - Simulador</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.7.2/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <p>Cargando el simulador...</p>
      <p>Si no carga en 5 segundos, haz clic en el botón abajo:</p>
      <a href="https://codesandbox.io/s/approximate-lvl-react-wvvs8v" 
         style="margin-top: 20px; background-color: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none;">
        Abrir en CodeSandbox
      </a>
    </div>
  </div>

  <script>
    // Redirección automática a CodeSandbox
    setTimeout(function() {
      window.location.href = "https://codesandbox.io/s/approximate-lvl-react-wvvs8v";
    }, 5000);
  </script>
</body>
</html>
